<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Duelist Creatives</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar glass">

  <a href="index.html" class="brand">
    <img src="logo.png" alt="Duelist Logo" class="nav-logo">
    <span class="brand-name">Duelist Creatives</span>
  </a>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="portfolio.html">Portfolio</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>

</nav>


<!-- CONTACT HERO -->
<section class="contact-hero">
  <h1>Let’s Work Together</h1>
  <p>Tell us about your project. We’ll bring it to life.</p>
</section>

<section class="contact-section">
  <div class="glass contact-box">

    <form action="https://formspree.io/f/xwvnoozg" method="POST">

      <input type="hidden" name="_subject" value="New Inquiry from Duelist Website">
      <input type="hidden" name="_captcha" value="false">

      <div class="form-group">
        <input type="text" name="name" placeholder="Your Name" required>
      </div>

      <div class="form-group">
        <input type="email" name="email" placeholder="Your Email" required>
      </div>

      <div class="form-group">
        <input type="text" name="phone" placeholder="Phone Number">
      </div>

      <div class="form-group">
        <textarea name="message" rows="5" placeholder="Tell us about your project..." required></textarea>
      </div>

      <button type="submit" class="btn">Send Message</button>

    </form>

  </div>
</section>


<!-- SOCIAL LINKS -->
<section class="contact-social">
  <h2>Connect With Us</h2>

  <div class="social-buttons">

    <!-- Instagram -->
    <a href="https://instagram.com/creativesduelist" 
       target="_blank" 
       class="social-btn">
       Instagram
    </a>

    <!-- WhatsApp -->
    <a href="https://wa.me/919113490357?text=Hi%20Duelist%20Creatives%2C%20I%20want%20to%20discuss%20a%20project." 
       target="_blank" 
       class="social-btn">
       WhatsApp
    </a>

    <!-- Email -->
    <a href="creativesduelist@gmail.com?subject=Project%20Inquiry%20-%20Duelist%20Creatives" 
       class="social-btn">
       Email
    </a>

  </div>
</section>


</body>
</html>
